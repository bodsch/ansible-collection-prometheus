---

- name: user and group handling
  when:
    - not running_in_check_mode
    - prometheus_system_user != "root"
  block:
    - name: create prometheus group
      ansible.builtin.group:
        name: "{{ prometheus_system_group }}"
        state: present
        system: true

    - name: create prometheus user
      ansible.builtin.user:
        name: "{{ prometheus_system_user }}"
        groups: "{{ prometheus_system_group }}"
        append: true
        shell: /usr/sbin/nologin
        system: true
        createhome: false
        home: /nonexistent

- name: merge prometheus configuration between defaults and custom
  ansible.builtin.set_fact:
    prometheus_service: "{{ prometheus_defaults_service | combine(prometheus_service, recursive=True) }}"

- name: create install directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ prometheus_install_path }}"
    state: directory
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_group }}"
    mode: "0755"

- name: deploy and activate prometheus version {{ prometheus_version }}
  when:
    - not running_in_check_mode
  bodsch.core.deploy_and_activate:
    src_dir: "{{ prometheus_local_tmp_directory }}"
    install_dir: "{{ prometheus_install_path }}"
    link_dir: "/usr/bin"
    remote_src: "{{ ('true' if prometheus_direct_download else 'false') | bool }}"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_group }}"
    mode: "0755"
    items:
      - name: "{{ prometheus_release.binary }}"
      - name: promtool
  notify:
    - restart prometheus

- name: create prometheus data directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ prometheus_data_dir }}"
    state: directory
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_group }}"
    mode: "0755"

- name: create prometheus configuration directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ prometheus_config_dir }}"
    state: directory
    owner: root
    group: "{{ prometheus_system_group }}"
    mode: "0770"

- name: create rules directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    state: directory
    path: "{{ prometheus_config_dir }}/rules"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_group }}"
    mode: "0750"

- name: create targets directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    state: directory
    path: "{{ prometheus_config_dir }}/targets"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_group }}"
    mode: "0750"

- name: create file_sd directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    state: directory
    path: "{{ prometheus_config_dir }}/file_sd"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_group }}"
    mode: "0750"

- name: systemd
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "systemd"
  block:
    - name: create prometheus run configuration
      ansible.builtin.template:
        src: "default/prometheus.j2"
        dest: "{{ prometheus_defaults_directory }}/prometheus"
        force: true
        owner: root
        group: "{{ prometheus_system_group }}"
        mode: "0640"
      notify:
        - simple restart prometheus

    - name: create systemd service unit
      ansible.builtin.template:
        src: "init/systemd/prometheus.service.j2"
        dest: "{{ systemd_lib_directory }}/prometheus.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - daemon-reload

- name: openrc
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "openrc"
  block:
    - name: create openrc service configuration
      ansible.builtin.template:
        src: "init/openrc/conf.d/prometheus.j2"
        dest: "/etc/conf.d/prometheus"
        owner: root
        group: root
        mode: "0644"
      notify:
        - simple restart prometheus

    - name: create openrc init configuration
      ansible.builtin.template:
        src: "init/openrc/init.d/prometheus.j2"
        dest: "/etc/init.d/prometheus"
        owner: root
        group: root
        mode: "0750"

- name: create custom fact file
  when:
    - not running_in_check_mode
  bodsch.core.facts:
    name: prometheus
    facts:
      version: "{{ prometheus_version }}"

...
