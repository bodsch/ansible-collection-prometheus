---
- name: user and group handling
  when:
    - not running_in_check_mode
    - alertmanager_system_user != "root"
  block:
    - name: create alertmanager group
      ansible.builtin.group:
        name: "{{ alertmanager_system_group }}"
        state: present
        system: true

    - name: create alertmanager user
      ansible.builtin.user:
        name: "{{ alertmanager_system_user }}"
        groups: "{{ alertmanager_system_group }}"
        append: true
        shell: /usr/sbin/nologin
        system: true
        createhome: false
        home: /nonexistent

- name: create install directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ alertmanager_install_path }}"
    state: directory
    owner: "{{ alertmanager_system_user }}"
    group: "{{ alertmanager_system_group }}"
    mode: "0755"

- name: deploy and activate alertmanager version {{ alertmanager_version }}
  bodsch.core.deploy_and_activate:
    src_dir: "{{ alertmanager_local_tmp_directory }}"
    install_dir: "{{ alertmanager_install_path }}"
    link_dir: "/usr/bin"
    remote_src: "{{ ('true' if alertmanager_direct_download else 'false') | bool }}"
    owner: "{{ alertmanager_system_user }}"
    group: "{{ alertmanager_system_group }}"
    mode: "0755"
    items:
      - name: "{{ alertmanager_release.binary }}"
      - name: amtool
  notify:
    - restart alertmanager

- name: create alertmanager data directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ alertmanager_data_dir }}"
    state: directory
    owner: "{{ alertmanager_system_user }}"
    group: "{{ alertmanager_system_group }}"
    mode: "0755"

- name: create alertmanager configuration directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ alertmanager_config_dir }}"
    state: directory
    owner: root
    group: "{{ alertmanager_system_group }}"
    mode: "0770"

- name: create amtool configuration directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ alertmanager_amtool.config_dir }}"
    state: directory
    owner: root
    group: "{{ alertmanager_system_group }}"
    mode: "0770"

- name: create alertmanager templates directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ item | dirname }}"
    state: directory
    owner: root
    group: "{{ alertmanager_system_group }}"
    mode: "0770"
  loop: "{{ alertmanager_templates }}"
  loop_control:
    label: "{{ item | dirname }}"

- name: systemd
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "systemd"
  block:
    - name: create alertmanager run configuration
      ansible.builtin.template:
        src: "alertmanager.j2"
        dest: "{{ alertmanager_defaults_directory }}/alertmanager"
        force: true
        owner: root
        group: "{{ alertmanager_system_group }}"
        mode: "0640"
      notify:
        - reload alertmanager

    - name: create systemd service unit
      ansible.builtin.template:
        src: "init/systemd/alertmanager.service.j2"
        dest: "{{ systemd_lib_directory }}/alertmanager.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - daemon-reload

- name: openrc
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "openrc"
  block:
    - name: create openrc service configuration
      ansible.builtin.template:
        src: "init/openrc/conf.d/alertmanager.j2"
        dest: "/etc/conf.d/alertmanager"
        owner: root
        group: root
        mode: "0644"

    - name: create openrc init configuration
      ansible.builtin.template:
        src: "init/openrc/init.d/alertmanager.j2"
        dest: "/etc/init.d/alertmanager"
        owner: root
        group: root
        mode: "0750"

- name: create custom fact file
  when:
    - not running_in_check_mode
  bodsch.core.facts:
    name: alertmanager
    facts:
      version: "{{ alertmanager_version }}"

...
